name: Build Master Notes

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.8-bin.zip -O gradle8.zip
          unzip -q gradle8.zip -d $HOME
          echo "$HOME/gradle-8.8/bin" >> $GITHUB_PATH

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle8-${{ hashFiles('**/*.gradle*') }}

      - name: Build Mod
        run: gradle build --no-daemon

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: MasterNotes-JAR
          path: build/libs/masternotes-*.jar
          if-no-files-found: error
